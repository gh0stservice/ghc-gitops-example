apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prd-<TENANT_HASH>-<APP_NAME>
  namespace: ghc-nsp-<TENANT_HASH>-<APP_NAME>
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  serviceAccountName: ghc-nsp-<TENANT_HASH>-<APP_NAME>-flux
  path: ./kustomize/overlays/ghc-basic/<TENANT_HASH>/<APP_NAME>
  prune: true
  sourceRef:
    kind: GitRepository
    name: ghc-git-<TENANT_HASH>-<TENANT_SLUG>
    namespace: flux-system
  wait: true
