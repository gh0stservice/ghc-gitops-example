apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ghc-nsp-<TENANT_HASH>-vaultwarden

resources:
  - ../../../../base/apps/vaultwarden/
  - externalsecret-admin-tenant.yaml
  - externalsecret-smtp-tenant.yaml
  - externalsecret-db-tenant.yaml
  - postgres.yaml

patches:
  - path: ingress-host.yaml
    target:
      group: networking.k8s.io
      kind: Ingress
      name: vaultwarden
      version: v1
  - path: helm-values.yaml
    target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: vaultwarden
      version: v2
  - path: helmrepository-namespace.yaml
    target:
      group: source.toolkit.fluxcd.io
      kind: HelmRepository
      name: vaultwarden
      version: v1
