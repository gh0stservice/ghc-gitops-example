apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-admin
spec:
  refreshInterval: 1h
  refreshPolicy: OnChange
  secretStoreRef:
    kind: SecretStore
    name: ghc-ss-<TENANT_HASH>-vaultwarden
  target:
    name: vaultwarden-admin
    creationPolicy: Owner
  data:
    - secretKey: admin_token
      remoteRef:
        key: tenants/<TENANT_HASH>/app/default/vaultwarden/admin
        property: admin_token
