apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-application
  namespace: ghc-nsp-tenantHash-my-application
spec:
  releaseName: my-application
  interval: 10m
  chart:
    spec:
      chart: application
      version: "6.16.1"
      sourceRef:
        kind: HelmRepository
        name: my-application
        namespace: ghc-nsp-tenantHash-my-application
  install:
    remediation:
      retries: 1
  upgrade:
    remediation:
      retries: 1
  values:
    applicationName: my-application
    service:
      type: ClusterIP

    deployment:
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 256Mi
    rbac:
      serviceAccount:
        enabled: false
        name: ""
    extraEnvVars: []
